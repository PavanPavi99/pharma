<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Create Bill</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eef5ff;
}

.card{
    margin-top:50px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.card-header{
    background:linear-gradient(45deg,#0d6efd,#00c6ff);
    color:white;
}

.form-control{
    border-radius:10px;
}

.btn{
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">
<h3>🧾 Create New Bill</h3>
</div>

<div class="card-body">

<form th:action="@{/bill/save}"
      th:object="${bill}"
      method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label>Bill Date</label>

<input type="date"
       class="form-control"
       th:field="*{billDate}"
       required>
</div>

<div class="col-md-6 mb-3">
<label>Payment Status</label>

<select class="form-control"
        th:field="*{paymentStatus}">

<option value="Paid">Paid</option>
<option value="Pending">Pending</option>
<option value="Unpaid">Unpaid</option>

</select>

</div>

</div>

<hr>

<h5>Medicine Details</h5>

<div class="row">

<div class="col-md-4 mb-3">

<label>Medicine</label>

<select class="form-control"
        th:field="*{medicineName}">

<option value="">-- Select Medicine --</option>

<option th:each="medicine : ${medicines}"
        th:value="${medicine.medicineName}"
        th:text="${medicine.medicineName}">
</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label>Quantity</label>

<input type="number"
       class="form-control"
       th:field="*{quantity}"
       required>

</div>

<div class="col-md-4 mb-3">

<label>Price</label>

<input type="number"
       class="form-control"
       th:field="*{price}"
       required>

</div>

</div>

<div class="mb-3">

<label>Total Amount</label>

<input type="number"
       class="form-control"
       th:field="*{totalAmount}"
       required>

</div>

<button class="btn btn-success">

💾 Save Bill

</button>

<a href="/bill"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

</body>

</html>